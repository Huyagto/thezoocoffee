services:
  mysql:
    image: mysql:8
    container_name: thezoo_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: thezoocoffee
      MYSQL_USER: prisma
      MYSQL_PASSWORD: 123456
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:

version: '3.8'

services:
    mysql:
        image: mysql:8
        container_name: thezoo_mysql
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: 123456
            MYSQL_DATABASE: guitarhub
        ports:
            - '3307:3306'
        volumes:
            - mysql_data:/var/lib/mysql

    app:
        build: .
        ports:
            - '3000:3000'
        depends_on:
            - mysql

volumes:
    mysql_data:

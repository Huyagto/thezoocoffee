services:
  mysql:
    image: mysql:8
    container_name: thezoo_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: thezoocoffee
      MYSQL_USER: prisma
      MYSQL_PASSWORD: 123456
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: thezoo_redis
    restart: always
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data: